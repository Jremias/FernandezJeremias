<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Multiverso de Personajes</title>

  <style>
    body { font-family: Arial; }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px;
      display: inline-block;
      width: 180px;
    }

    .rick { border-left: 5px solid green; }
    .simpsons { border-left: 5px solid orange; }

    img { width: 100%; }

    .fav {
      background: gold;
    }
  </style>
</head>

<body>

<h1>Multiverso de Personajes</h1>

<input id="busqueda" placeholder="Buscar personaje">
<button id="botonBuscar">Buscar</button>

<select id="apiSelect">
  <option value="rickAndMorty">Rick and Morty</option>
  <option value="theSimpsons">Los Simpsons</option>
  <option value="ambas">Ambas</option>
</select>

<div id="resultados"></div>
<div id="stats"></div>
<div id="favoritos"></div>
<script src="JS/fnc.js"></script>
</body>
</html>
