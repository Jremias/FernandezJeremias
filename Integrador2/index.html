<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        label {
            font-family: Arial;
            font-size: 16px;
        }
        div {
            font-family: Arial;
            font-size: 16px;
        }
    </style>
    <title>Multiverso de Personajes</title>
</head>
<body>
    <h1>Multiverso de Personajes</h1>
    <br>
    <label for="selectAPIs">Seleccione un universo</label>
    <select id="selectAPIs">
        <option value="rickAndMorty">Rick y Morty</option>
        <option value="theSimpsons">Los Simpsons</option>
        <option value="ambas">Rick y Morty y Los Simpsons</option>
    </select>
    <br>
    <label for="inputBuscar">Ingrese un nombre</label>
    <input id="inputBuscar" type="text" placeholder="Nombre">
    <button id="buttonBuscar">Buscar</button>
    <div id="mostrarError"></div>
    <br>
    <div id="tarjetaDePersonaje">
        <h2>Tarjeta de Personaje</h2>
    </div>
    <br>
    <div id="estadisticas">
        <h2>Estadísticas</h2>
    </div>
    <br>
    <div id="favoritos">
        <h2>Lista de favoritos</h2>
    </div>
    <button id="darFavorito">Dar Favorito</button>
    <script src="JS/fnc.js"></script>
</body>
</html>
